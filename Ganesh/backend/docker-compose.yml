# InsightForge AI — Local development stack
# Usage: docker compose up -d
# API: http://localhost:8000/docs

name: insightforge

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: insightforge-api
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - insightforge-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: insightforge-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - insightforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: insightforge-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - insightforge-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Celery worker — enable in Phase 3+
  # celery-worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
  #   container_name: insightforge-celery
  #   command: celery -A app.celery_app worker --loglevel=info
  #   env_file:
  #     - .env
  #   environment:
  #     POSTGRES_HOST: postgres
  #     REDIS_HOST: redis
  #   volumes:
  #     - ./app:/app/app
  #   depends_on:
  #     - api
  #     - redis
  #     - postgres
  #   networks:
  #     - insightforge-net
  #   restart: unless-stopped

networks:
  insightforge-net:
    driver: bridge
    name: insightforge-net

volumes:
  postgres_data:
    name: insightforge-postgres-data
  redis_data:
    name: insightforge-redis-data
